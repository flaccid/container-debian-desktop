fileContentTests:
  - name: "noVNC index.html redirects to vnc_auto.html with remote resize"
    path: "/usr/share/novnc/index.html"
    expectedContents: ["resize=remote"]

  - name: "vnc.html includes audio-plugin.js"
    path: "/usr/share/novnc/vnc.html"
    expectedContents: ['audio-plugin.js']

  - name: "vnc.html sets window.NVUI = UI"
    path: "/usr/share/novnc/vnc.html"
    expectedContents: ['window.NVUI = UI']

  - name: "pulse virtual-sink config is correct"
    path: "/etc/pulse/default.pa.d/virtual-sink.pa"
    expectedContents: ["module-null-sink", "virtual_sink"]

  - name: "pulse audio-stream config is correct"
    path: "/etc/pulse/default.pa.d/audio-stream.pa"
    expectedContents: ["module-simple-protocol-tcp", "virtual_sink.monitor"]

  - name: "xstartup uses dbus-launch startxfce4 and vncconfig"
    path: "/etc/skel/admin/.vnc/xstartup"
    expectedContents: ["dbus-launch", "startxfce4", "vncconfig -nowin"]

  - name: "chrome wrapper has no-sandbox flag"
    path: "/usr/local/bin/google-chrome"
    expectedContents: ["--no-sandbox"]

  - name: "signal wrapper has no-sandbox flag"
    path: "/usr/local/bin/signal-desktop"
    expectedContents: ["--no-sandbox"]

  - name: "code wrapper has no-sandbox flag"
    path: "/usr/local/bin/code"
    expectedContents: ["--no-sandbox"]

  - name: "entrypoint has gosu logic"
    path: "/usr/local/bin/entrypoint.sh"
    expectedContents: ["gosu"]

  - name: "reset-xfce4 restores from skeleton"
    path: "/usr/local/bin/reset-xfce4"
    expectedContents: ["/etc/skel/admin"]

  - name: "xsettings.xml has Ubuntu 11 font"
    path: "/etc/skel/admin/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml"
    expectedContents: ["Ubuntu 11", "JetBrains Mono 10", "Adwaita-dark", "Papirus-Dark"]

  - name: "xfce4-panel.xml has icon-size 32"
    path: "/etc/skel/admin/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"
    expectedContents: ['"icon-size" type="uint" value="32"']

  - name: "xfce4-panel.xml has size 42"
    path: "/etc/skel/admin/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"
    expectedContents: ['"size" type="uint" value="42"']

  - name: "xfce4-panel.xml uses applicationsmenu"
    path: "/etc/skel/admin/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"
    expectedContents: ["applicationsmenu"]

  - name: "xfce4-screensaver.xml has 1-hour idle activation delay"
    path: "/etc/skel/admin/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-screensaver.xml"
    expectedContents:
      - '"timeout" type="int" value="3600"'
      - '"enabled" type="bool" value="true"'
      - '"delay" type="int" value="60"'
      - '"mode" type="int" value="0"'

metadataTest:
  entrypoint: ["/usr/local/bin/entrypoint.sh"]
  cmd: ["/usr/local/bin/start-desktop.sh"]
  user: "root"
