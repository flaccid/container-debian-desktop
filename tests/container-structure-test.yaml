    args: ["gosu"]
    expectedOutput: ["/usr/sbin/gosu"]

  - name: "tigervnc is installed"
    command: "which"
    args: ["Xvnc"]
    expectedOutput: ["/usr/bin/Xvnc"]

  - name: "websockify is installed"
