enabled: true

replicaCount: 1

image:
  repository: quay.io/oauth2-proxy/oauth2-proxy
  tag: latest

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

config:
  provider: google
  redirectUrl: ""
  cookieSecure: true
  httpAddress: 0.0.0.0:4180
  setAuthorizationHeader: true
  passBasicAuth: true
  basicAuthPassword: password
  authenticatedEmails: []
  clientId: ""
  clientSecret: ""
  cookieSecret: ""
