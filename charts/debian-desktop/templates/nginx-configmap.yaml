apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "debian-desktop.fullname" . }}-nginx
  labels:
    {{- include "debian-desktop.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        root /usr/share/novnc;

        # Force fresh page loads — never cache the HTML/JS that loads the audio plugin
        location ~* \.(html|js|json)$ {
            expires -1;
            try_files $uri $uri/ @proxy;
        }

        # Add cache-bust param to the redirect URL so a stale cached index.html
        # still forces a fresh fetch of vnc_auto.html
        location = /index.html {
            expires -1;
            return 302 /vnc.html?resize=remote;
        }

        # Serve favicon using the Debian swirl SVG
        location = /favicon.ico {
            default_type image/svg+xml;
            try_files /openlogo-debianV2.svg =404;
        }

        location / {
            try_files $uri @proxy;
        }

        location = /logout {
            try_files /logout.html =404;
        }

        location /audio/ {
            proxy_pass http://127.0.0.1:6902/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location @proxy {
            proxy_pass http://127.0.0.1:6901;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;

            sub_filter_types text/html;
            sub_filter '<!-- Connection controls -->'
                       '<input type="image" alt="Sign Out" src="app/images/logout.svg"
                            id="noVNC_signout_button" class="noVNC_button"
                            title="Sign Out"
                            onclick="location.href=\'/logout\'; return false;">
            <!-- Connection controls -->';
            sub_filter_once on;
            sub_filter '</head>'
                       '<style>
            #noVNC_signout_button { filter: brightness(0) invert(1); }
        </style></head>';
        }
    }
  logout.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Out</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a1a;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 12px;
        padding: 3rem;
        text-align: center;
        max-width: 440px;
        width: 90%;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin-bottom: 1.5rem;
        filter: brightness(0) invert(1);
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      p {
        color: #aaa;
        margin-bottom: 2rem;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .buttons {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        padding: 0.75rem 1.5rem;
        border: 1px solid #555;
        border-radius: 8px;
        background: transparent;
        color: #e0e0e0;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #3a3a3a;
      }
      .btn svg {
        width: 18px;
        height: 18px;
        margin-right: 0.5rem;
        flex-shrink: 0;
      }
      .footer {
        margin-top: 2rem;
        font-size: 0.75rem;
        color: #666;
      }
    </style>
    </head>
    <body>
    <div class="card">
      <img src="openlogo-debianV2.svg" alt="Debian" class="logo">
      <h1>Sign Out</h1>
      <p>You are signed in with Google. Sign out below to switch accounts or end your session.</p>
      <div class="buttons">
        <a href="#" class="btn" id="signoutBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
          </svg>
          Sign Out
        </a>
        <a href="/" class="btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
          Cancel
        </a>
      </div>
      <div class="footer">Debian Desktop</div>
    </div>
    <script>
      document.getElementById('signoutBtn').addEventListener('click', function(e) {
        e.preventDefault();
        var host = window.location.host;
        var rd = 'https://accounts.google.com/Logout?continue=https%3A%2F%2F' + encodeURIComponent(host);
        window.location.href = '/oauth2/sign_out?rd=' + encodeURIComponent(rd);
      });
    </script>
    </body>
    </html>
  logout.svg: |
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#fff">
      <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
    </svg>
